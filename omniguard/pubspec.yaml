name: omniguard
description: OmniGuard SOC Dashboard - AI-powered threat detection and security analytics platform.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3
  fl_chart: ^0.68.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2784.1
  web_socket_channel: ^3.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  web: ^1.1.0
  webview_flutter: ^4.7.0
  
dev_dependencies:
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/
